name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install (CPU torch — no GPU on runners)
        run: |
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install scikit-learn pandas numpy matplotlib Pillow streamlit pytest

      - name: Test (data-dependent tests skip without the ELPV download)
        run: pytest -v
